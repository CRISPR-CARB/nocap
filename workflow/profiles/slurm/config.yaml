# workflow/profiles/slurm/config.yaml
# Snakemake SLURM executor profile for the cyclic single-door workflow.
#
# Usage:
#   snakemake --profile workflow/profiles/slurm --configfile workflow/config.yaml
#
# Requires snakemake-executor-plugin-slurm:
#   pip install snakemake-executor-plugin-slurm
#   (or: uv add --optional workflow snakemake-executor-plugin-slurm)

executor: slurm

# Default SLURM submission options (overridden per-rule via resources:)
#
# IMPORTANT: do NOT set nodes: here.  Requesting nodes: 1 causes the SLURM
# executor plugin to book an entire compute node (e.g. 64 CPUs) even though
# every rule only needs cpus_per_task: 1.  Omitting nodes: lets Slurm infer
# the node count from cpus_per_task, so each job consumes exactly 1 CPU from
# the GrpTRESMins budget instead of 64.
default-resources:
  slurm_account: crispr_carb
  slurm_partition: slurm
  mem_mb: 4000
  runtime: 60          # minutes; overridden per-rule in the Snakefile
  tasks: 1
  cpus_per_task: 1

# Retry failed jobs up to 2 times before giving up
retries: 2

# Keep going with independent jobs if one fails
keep-going: true

# Print shell commands before executing
printshellcmds: true

# Rerun incomplete output files (handles shard corruption / partial writes)
rerun-incomplete: true

# Number of jobs to submit simultaneously
jobs: 200

# Latency wait: seconds to wait for output files to appear on shared filesystem
latency-wait: 60
